        actions:
          - kind: SendActivity
            id: sendMessage_M0LuhV
            activity:
              text:
                - |-
                  Hallo {System.User.FirstName},

                  ich unterstütze Sie gern bei HR‑bezogenen Anliegen – sei es zu Urlaubsregelungen, Leistungen oder Unternehmensrichtlinien.
                  Sie können mich zum Beispiel fragen:
                  - Wie lautet die Regelung für den Jahresurlaub?
                  - Bitte informieren Sie mich über Leistungen und Gehaltsabrechnung.
                  - Welche Unternehmensrichtlinien und Verfahren gelten?

                  <br />
                  Ich möchte HR‑Informationen schnell und einfach zugänglich machen – stellen Sie einfach Ihre Frage!
