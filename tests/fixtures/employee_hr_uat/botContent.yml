          - kind: SendActivity
            id: sendMessage_M0LuhV
            activity:
              text:
                - |-
                  Bonjour {System.User.FirstName},

                  Je suis ici pour vous aider concernant vos questions RH — qu’il s’agisse des politiques de congés, des avantages ou des directives de l’entreprise.
                  Vous pouvez commencer par me demander, par exemple :
                  - Quelle est la politique de congés annuels ?
                  - Pouvez‑vous m’expliquer les avantages et la paie ?
                  - Quelles sont les directives et procédures de l’entreprise ?

