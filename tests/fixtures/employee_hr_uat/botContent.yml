      - displayName: Get Knowledge Articles
        description: Returns a list of knowledge base (KB) articles which can be searched and filtered
        inputType:
          properties:
            fields:
              displayName: Fields
              description: Comma-separated list of fields from the Knowledge table.
              order: 1
              type: String

            filter:
              displayName: Filter
              description: Encoded query to use to filter the result set.
              visibility: Advanced
              order: 3
              type: String

            kb:
              displayName: Kb
              description: Comma-separated list of knowledge base sys_ids.
              visibility: Advanced
              order: 4
              type: String

            limit:
              displayName: Limit
              description: Maximum number of records to return.
              order: 2
              type: Number

            query:
              displayName: Query
              description: Text to search for.
              isRequired: true
              order: 0
              type: String

        outputType:
          kind: Record
          properties:
            articles:
              order: 1
              type:
                kind: Table
                properties:
                  fields:
                    displayName: fields
                    order: 0
                    type:
                      kind: Record
                      properties:
                        display_value:
                          displayName: Display Value
                          description: Display value of the requested field
                          order: 0
                          type: String

                        label:
                          displayName: Label
                          description: Label representing the requested field
                          order: 1
                          type: String

                        name:
                          displayName: Name
                          description: Name of the requested field
                          order: 2
                          type: String

                        type:
                          displayName: Type
                          description: Data type of requested field
                          order: 3
                          type: String

                        value:
                          displayName: Value
                          description: Value of the requested field
                          order: 4
                          type: String

                  id:
                    displayName: id
                    description: Knowledge article sys_id from the Knowledge [kb_knowledge] table
                    order: 2
                    type: String

                  Link:
                    displayName: Link
                    description: Link to the article
                    order: 1
                    type: String

                  number:
                    displayName: Number
                    description: Knowledge article sys_id from the Knowledge [kb_knowledge] table
                    order: 3
                    type: String

                  rank:
                    displayName: Rank
                    description: Search rank of article specific to this search
                    order: 4
                    type: Number

                  score:
                    displayName: Score
                    description: Relevancy score, results sorted in descending order by score
                    order: 5
                    type: Number

                  snippet:
                    displayName: Snippet
                    description: Text showing a small portion of the knowledge article
                    order: 6
                    type: String

                  title:
                    displayName: Title
                    description: Short description or title of the knowledge article
                    order: 7
                    type: String

            meta:
              order: 0
              type:
                kind: Record
                properties:
                  count:
                    displayName: Count
                    description: Number of available KB articles
                    order: 0
                    type: Number

                  end:
                    displayName: End
                    description: Ending index of the result set
                    order: 1
                    type: Number

                  fields:
                    displayName: Fields
                    description: Fields in the article
                    order: 2
                    type: String

                  filter:
                    displayName: Filter
                    description: Filter used to acquire the data
                    order: 3
                    type: String

                  kb:
                    displayName: Kb
                    description: List of knowledge base article sys_ids
                    order: 4
                    type: String

                  language:
                    displayName: Language
                    description: List of comma-separated languages of the KB articles that were requested
                    order: 5
                    type: String

                  query:
                    displayName: Query
                    description: Specified request query
                    order: 6
                    type: String

                  start:
                    displayName: Start
                    description: Starting index of result set
                    order: 7
                    type: String

                  status:
                    order: 8
                    type:
                      kind: Record
                      properties:
                        code:
                          displayName: Status
                          description: Status of the call
                          order: 0
                          type: String

                  ts_query_id:
                    displayName: Kb
                    description: List of comma-separated languages of the KB articles that were requested
                    order: 9
                    type: String

        operationId: GetKnowledgeArticles

