        intent:
          displayName: Escalade
          triggerQueries:
            - Parler à un agent
            - Puis‑je contacter quelqu’un d’autre ?
            - Puis‑je obtenir l’aide d’un vrai agent ?
            - Pouvez‑vous me transférer à une personne ?
            - Puis‑je obtenir un numéro ou être rappelé(e) ?
            - Un conseiller peut‑il m’appeler ?
            - Puis‑je planifier un appel ?
            - Puis‑je parler à un conseiller ?
            - Puis‑je parler à une personne réelle ?
            - Puis‑je parler à un assistant humain ?
            - Quelqu’un peut‑il m’appeler ?
            - Parler à une personne
            - Discuter avec une personne
            - Discuter avec un conseiller
            - Discuter avec un agent
            - Je souhaite discuter avec quelqu’un
            - Connectez‑moi à un agent en direct
            - Connectez‑moi à une personne
            - Quelqu’un peut‑il me contacter par téléphone ?
            - Agent du service client
            - Représentant du service client
            - Service client
            - Parler à quelqu’un
            - J’ai besoin qu’un responsable me contacte
            - J’ai besoin du service client
            - J’ai besoin de l’aide d’une personne
            - J’ai besoin de parler à un agent en direct
            - J’ai besoin de parler à un spécialiste
            - Je veux parler au service client
            - Je souhaite poursuivre avec l’assistance en direct
            - Je souhaite parler à un consultant
            - Je souhaite parler à un technicien en direct
            - Je souhaite parler à un collaborateur
            - Me rappeler
            - Je souhaite parler à un technicien
            - Parler avec un membre du support technique
            - Appeler le service client
            - Merci de me rappeler
            - Appeler le support
            - Appeler l’assistance technique
            - Un agent peut‑il m’appeler ?
            - Puis‑je appeler ?

        actions:
          - kind: SendActivity
            id: sendMessage_s39DCt
            activity: |-
              Je suis désolé que cela ne vous ait pas aidé — je comprends que cela puisse être frustrant. Essayons à nouveau ensemble. Veuillez partager un peu plus de détails et je ferai de mon mieux pour vous aider.

              Vous pouvez également contacter directement les RH via le _Chat en direct_ (https://ingglits.service-now.com/msp?open_chat=true), disponible du lundi au vendredi de 09h00 à 15h30 CET.

