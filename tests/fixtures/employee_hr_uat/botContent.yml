    operations:
      - displayName: Get Attachment Metadata
        description: Retrieve metadata for attachments
        inputType:
          properties:
            sysparm_limit:
              displayName: Limit
              description: "Limit to be applied on pagination. Note: Unusually large sysparm_limit values can impact system performance. Default: 1000"
              order: 0
              type: String

            sysparm_offset:
              displayName: Offset
              description: "Number of records to exclude from the query. Use this parameter to get more records than specified in sysparm_limit. For example, if sysparm_limit is set to 500, but there are additional records you want to query, you can specify a sysparm_offset value of 500 to get the second set of records. Default: 0"
              order: 1
              type: String

            sysparm_query:
              displayName: Query
              description: "Encoded query. Queries for the Attachment API are relative to the Attachments [sys_attachment] table. For example: (sysparm_query=file_name=attachment.doc)"
              order: 2
              type: String

        outputType: String
        operationId: GetAttachmentMetdata

      - displayName: Upload a binary file as an attachment
        description: Uploads a binary file as an attachment to a specified record
        inputType:
          properties:
            file:
              displayName: File
              description: Binary file to attach to the specified record
              isRequired: true
              order: 3
              type: File

            file_name:
              displayName: File Name
              description: Name to give the attachment
              isRequired: true
              order: 2
              type: String

            table_name:
              displayName: Table Name
              description: Name of the table to which you want to attach the file
              isRequired: true
              order: 0
              type: String

            table_sys_id:
              displayName: Sys ID
              description: Sys_id of the record on the specified table to which you want to attach the file
              isRequired: true
              order: 1
              type: String

        outputType:
          kind: Record
          properties:
            result:
              description: Metadata of the requested attachment.
              order: 0
              type:
                kind: Record
                properties:
                  average_image_color:
                    description: If the attachment is an image, the sum of all colors.
                    order: 0
                    type: String

                  compressed:
                    description: Flag that indicates whether the attachment file has been compressed.
                    order: 1
                    enumValues:
                      - "true"
                      - "false"
                    type: String

                  content_type:
                    description: Content-type of the associated attachment file, such as image or jpeg or application/x-shockwave-flash.
                    order: 2
                    type: String

                  created_by_name:
                    description: Full name of entity that originally created the attachment file.
                    order: 3
                    type: String

                  download_link:
                    description: Download URL of the attachment on the ServiceNow instance.
                    order: 4
                    type: String

                  file_name:
                    description: File name of the attachment.
                    order: 5
                    type: String

                  image_height:
                    description: "If an image file, the height of the image. Unit: Pixels"
                    order: 6
                    type: String

                  image_width:
                    description: "If an image file, the width of the image. Unit: Pixels"
                    order: 7
                    type: String

                  size_bytes:
                    description: "Size of the attachment. Unit: Bytes"
                    order: 8
                    type: String

                  size_compressed:
                    description: "Size of the attachment. Unit: Bytes"
                    order: 9
                    type: String

                  sys_created_by:
                    description: Entity that originally created the attachment file.
                    order: 10
                    type: String

                  sys_created_on:
                    description: Date and time that the attachment file was initially saved to the instance.
                    order: 11
                    type: String

                  sys_id:
                    description: Sys_id of the attachment file.
                    order: 12
                    type: String

                  sys_mod_count:
                    description: Number of times the attachment file has been modified (uploaded to the instance).
                    order: 13
                    type: String

                  sys_tags:
                    description: Any system tags associated with the attachment file.
                    order: 14
                    type: String

                  sys_updated_by:
                    description: Any system tags associated with the attachment file.
                    order: 15
                    type: String

                  sys_updated_on:
                    description: Date and time that the attachment file was last updated.
                    order: 16
                    type: String

