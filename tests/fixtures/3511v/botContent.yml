    dialog:
      beginDialog:
        kind: OnGeneratedResponse
        id: main
        condition: =Global.NoClaQuestion = "No"
        actions:
          - kind: InvokeAIBuilderModelAction
            id: invokeAIBuilderModelAction_kGrBcR
            input:
              binding:
                Text_20input: =System.Activity.Text

            output:
              binding:
                predictionOutput: Topic.TicketEligiblePromptKN

            aIModelId: b030db4e-10f0-4ef3-9c70-cdf1412b694f

          - kind: SetVariable
            id: setVariable_GIKHsK
            variable: Topic.TicketEligibilityKN
            value: =Topic.TicketEligiblePromptKN.text

          - kind: SetVariable
            id: M87y4f
            variable: System.ContinueResponse
            value: =false

          - kind: SetVariable
            id: z0XgYP
            variable: Global.agentResponse
            value: |-
              =Trim(
                  With(
                      { 
                          // 1. Cut off the text at the start of the citation block "[1]:"
                          // If no citations exist, this keeps the whole text.
                          CleanedFooter: First(Split(System.Response.FormattedText, "[1]:")).Value 
                      },
                      // 2. Remove inline markers [1] through [6]
                      Substitute(
                          Substitute(
                              Substitute(
                                  Substitute(
                                      Substitute(
                                          Substitute(
                                              CleanedFooter,
                                              "[1]", ""
                                          ),
                                          "[2]", ""
                                      ),
                                      "[3]", ""
                                  ),
                                  "[4]", ""
                              ),
                              "[5]", ""
                          ),
                          "[6]", ""
                      )
                  )
              )

          - kind: ConditionGroup
            id: conditionGroup_YB60CH
            conditions:
              - id: conditionItem_hQOlD5
                condition: =Topic.TicketEligibilityKN = "Eligible"
                actions:
                  - kind: SendActivity
                    id: sXvtaj
                    activity:
                      text:
                        - |
                          {Global.agentResponse}
                      quickReplies:
                        - kind: MessageBack
                          title: Provide feedback
                          text: Provide feedback

                        - kind: MessageBack
                          text: Create Ticket

            elseActions:
              - kind: SendActivity
                id: eoqbaJ
                activity:
                  text:
                    - |
                      {Global.agentResponse}
                  quickReplies:
                    - kind: MessageBack
                      title: Provide feedback
                      text: Provide feedback

          - kind: ConditionGroup
            id: vyOx7j
            conditions:
              - id: GL3FeL
                condition: =Global.Initiallanguage <> System.User.Language
                actions:
                  - kind: SetVariable
                    id: OWXetd
                    variable: System.User.Language
                    value: =Global.Initiallanguage

      inputType: {}
      outputType: {}

