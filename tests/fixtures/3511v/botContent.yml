    displayName: Conversational boosting
    id: 0104f24f-d8bc-4424-ae7a-272f7fb87030
    parentBotId: b9753fc1-b3c9-4912-9429-b60ec983dca6
    description: Create generative answers from knowledge sources.
    shareContext: {}
    state: Active
    status: Active
    publisherUniqueName: Global_Work_Places_Services
    schemaName: cr2b9_employeeHrAgent.topic.Search
    dialog:
      beginDialog:
        kind: OnUnknownIntent
        id: main
        priority: -1
        actions:
          - kind: ConditionGroup
            id: I0uXPW
            conditions:
              - id: vUNaya
                condition: =!IsBlank(Global.previousQuestion)
                actions:
                  - kind: SetVariable
                    id: B4mI30
                    variable: Global.previousQuestion
                    value: =System.Activity.Text

                  - kind: SetVariable
                    id: BLLOcP
                    variable: Global.fullUserQuery
                    value: =Global.previousQuestion

            elseActions:
              - kind: SetVariable
                id: 80Jmb9
                variable: Global.fullUserQuery
                value: =Global.previousQuestion & " → " & System.LastMessage.Text

          - kind: InvokeAIBuilderModelAction
            id: invokeAIBuilderModelAction_AP3JTj
            input:
              binding:
                Text_20input: =System.Activity.Text

            output:
              binding:
                predictionOutput: Topic.TicketEligiblePromptCB

            aIModelId: b030db4e-10f0-4ef3-9c70-cdf1412b694f

          - kind: SetVariable
            id: setVariable_MmvsPr
            variable: Topic.TicketEligibilityCB
            value: =Topic.TicketEligiblePromptCB.text

          - kind: SearchAndSummarizeContent
            id: search-content
            latencyMessageSettings:
              allowLatencyMessage: true
              latencyMessage: _Just a moment, {System.User.FirstName}— I’m gathering insights for you._

            autoSend: false
            variable: Global.agentResponse
            userInput: =Global.fullUserQuery
            additionalInstructions: |-
              \# 🖋️ OUTPUT FORMATTING RULES

              Opening (no title shown to user):
              If the topic carries emotional weight e.g. Supportive: bereavement, illness, miscarriage, redundancy, conflict, harassment, frustration, urgency, loss of trust. Tone: warm, calm, brief
              Celebratory: new child, adoption, promotion, return from leave. Tone: warm, congratulatory, brief. One or two sentences. start the response with 1–2 empathetic sentences.
              This is a section and must NOT be labeled, titled, or referenced in any way.
              Do not include words like “Empathy”, “Support”, or similar.
              It is not a part of Summary.
              1. Opening (no title shown to user): Only include empathy for genuinely emotional, difficult, or high-impact personal situations such as bereavement, illness, conflict, harassment, or distress
              2. Summary: One or two sentences answering the core question.
              3. What You Can Do: Eligibility, entitlements, deadlines, and concrete actions.
              4. References: Preserve native grounded source links whenever available and consistent formatting. Do not restyle, rename, recolor, summarize, or manually recreate source links.
              5. Follow-Up:  Then list one or two relevant follow-up question suggestions as bullet points.
              6. Ticket Status: Status of the ticket creation eligiblity
              7. **Disclaimer (always last): > AI-generated; refer to official documentation, as answers given may be inaccurate or incomplete. Do not include personal, confidential or sensitive data.**

              ### ✅ Spacing & Layout Rules
              - Each section must start on a new line.
              - Insert one blank line between sections for readability.
              - Insert one blank line between bullet points.
              - Do NOT merge sections into a single paragraph; keep them visually distinct.
              - Use Markdown headings or emojis for section titles (e.g., 🎯 Summary, ✅ What You Can Do).
              - After each heading, insert one blank line before the content.
              - Draw a line after each section

              ### 🧠 General Style Rules
              - Use “I” for the assistant and “you” for the user.
              - Use short, clear sentences.
              - Number steps for clarity.
              - Highlight keywords in bold.
              - Format UI labels in _bold italics_.
              - Always render links in Markdown: \`label\`
              - Do not output link text only — include full URL.
              - Maintain clear line spacing between each section for readability.
              - Alway hyperlink the knowledge articlet used for the generating the answer
            fileSearchDataSource:
              searchFilesMode:
                kind: DoNotSearchFiles

            knowledgeSources:
              kind: SearchSpecificKnowledgeSources
              knowledgeSources:
                - cr2b9_employeeHrAgent.topic.SpeakUpPoint_igwkhGl8_dO2_giEU9Syz
                - cr2b9_employeeHrAgent.topic.GlobalCodeofconductNetherland_n40C98OWl4ZLNt2VN9pD8
                - cr2b9_employeeHrAgent.topic.SpeakUpmisconduct_4XyEcvsZ1xCAND8JXSoSo
                - cr2b9_employeeHrAgent.topic.SpeakUpundesirablebehaviour_Rvz4FdoMYmcMyCzyJehDQ
                - cr2b9_employeeHrAgent.topic.Orangecodeaspx_FG3PXFOv0dL7sPbYwFuPn
                - cr2b9_employeeHrAgent.topic.SpeakUpPointCasemanagers_gxDyFQ3qVJwr_G7PjA2Ws
                - cr2b9_employeeHrAgent.topic.ConversationstarterSpeakUpandListenUp_QcqveK3LvYxLAVePVRMfF
                - cr2b9_employeeHrAgent.topic.EmployeeHRknowledgeGlobalPages_9uZtWCEDpBBC4SaKgIqr1
                - cr2b9_employeeHrAgent.topic.HRDocumentNL_wW1744yVZcxhgcvXnaAJk
                - cr2b9_employeeHrAgent.topic.EmployeeManagerKnowledgepages_YHcc2fcCl_D3hy11_ctUd
                - cr2b9_employeeHrAgent.topic.NewHRKnowledge_Ap_c1Zn5ZoNAjfQLEwHn3

          - kind: ConditionGroup
            id: has-answer-conditions
            conditions:
              - id: has-answer
                condition: =!IsBlank(Global.agentResponse)
                actions:
                  - kind: ConditionGroup
                    id: conditionGroup_7Nhmgy
                    conditions:
                      - id: conditionItem_W7hQ7t
                        condition: =Topic.TicketEligibilityCB = "Eligible"
                        actions:
                          - kind: SendActivity
                            id: S6hA0m
                            activity:
                              text:
                                - |
                                  {Global.agentResponse}
                                  <br />
                              quickReplies:
                                - kind: MessageBack
                                  title: Provide feedback
                                  text: Provide feedback

                                - kind: MessageBack
                                  title: Create Ticket
                                  text: Create Ticket

                    elseActions:
                      - kind: SendActivity
                        id: bcptQO
                        activity:
                          text:
                            - |
                              {Global.agentResponse}
                              <br />
                          quickReplies:
                            - kind: MessageBack
                              title: Provide feedback
                              text: Provide feedback

                  - kind: EndDialog
                    id: end-topic
                    clearTopicQueue: true

