      - displayName: Create a chat
        description: Creates a one on one or group chat
        nameForModel: create_a_chat
        descriptionForModel: "Use tool to start a new Microsoft Teams 1 on 1 chat or group chat with specified people. Example user intent: start a chat with Alex about this incident."
        inputType:
          properties:
            members:
              displayName: Members to add
              description: User's IDs, separated by semicolons
              nameForModel: create_chat_members
              descriptionForModel: "Set to the other chat participants emails or user IDs separated by semicolons. User ID is Microsoft Entra ID user object IDs (GUIDs). You MUST NOT use raw names. Use either emails or the user IDs. Do not include the current USER's email or ID even if they ask to include them, as it's added automatically. Avoid duplicates. One ID or email creates a 1:1 chat; two or more create a group chat where the Title is shown. Example: alias@xyz.com;alias@abc.com"
              isRequired: true
              order: 0
              type: String

            topic:
              displayName: Title
              description: Title, displayed only in group chats
              nameForModel: create_chat_topic
              descriptionForModel: "Set to a short title for group chats only. Use a name that reflects the purpose. Leave empty if it is a 1 on 1 chat or if the name of the chat cannot reasonably be determined from request. Prefer capitalizing first letters unless user specifies topic. Example: Incident 1042, Q4 Planning Discussion"
              order: 1
              type: String

        outputType:
          kind: Record
          properties:
            id:
              displayName: Conversation ID
              description: The chat's unique identifier
              order: 0
              type: String

        operationId: CreateChat

