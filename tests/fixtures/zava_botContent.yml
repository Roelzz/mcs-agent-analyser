      - displayName: Post message in a chat or channel
        description: Posts a message to a chat or a channel
        nameForModel: post_message_to_conversation
        descriptionForModel: "Use this tool to send or post messages in Microsoft Teams, either to a group chat or to a channel. Sample intent: notify the team in the Incidents chat about recent sev2."
        inputType:
          properties:
            body:
              displayName: Post message request
              description: The post message request
              isRequired: true
              order: 2
              type: UnresolvedDynamicType

            location:
              displayName: Post in
              description: Select an option
              nameForModel: post_message_to_conversation_location
              descriptionForModel: Set to type of conversation where message should be posted. Valid values are "Group chat" (for group chats), "Channel" (for team channels), or "Chat with Flow bot" (for bot conversations). DO NOT select "Chat with Flow bot" if you set the poster property to be "User". If poster is Flow bot or Microsoft Copilot Studio agent and user does not specify location to post, default to "Chat with Flow bot".
              isRequired: true
              order: 1
              dynamicValuesConfig:
                capability: List

              type: String

            poster:
              displayName: Post as
              description: Select an option
              nameForModel: post_message_to_conversation_poster
              descriptionForModel: Set to the sender identity. Valid values are "User" (for messages from signed-in user), "Flow bot" (automated notifications), or "Microsoft Copilot Studio agent" (bot messages). Default to "User" if not specified.
              isRequired: true
              order: 0
              enumDisplayNames:
                - User
                - Flow bot
                - Microsoft Copilot Studio agent
              enumValues:
                - User
                - Flow bot
                - Power Virtual Agents
              type: String

        outputType:
          kind: Record
          properties:
            conversationId:
              displayName: Conversation ID
              description: The chat's unique identifier
              order: 2
              type: String

            id:
              displayName: Message ID
              description: Unique message ID
              order: 0
              type: String

            messageLink:
              displayName: Message link
              description: Link to the message in Microsoft Teams
              order: 1
              type: String

        operationId: PostMessageToConversation

