connectorDefinitions:
  - connectorId: /providers/Microsoft.PowerApps/apis/shared_advancedapprovals
    version: 639059169014713200
    displayName: Human in the loop
    description: Enables human input in workflows and agents.
    connectorType: Public
    iconUri: https://conn-afd-prod-endpoint-bmc9bqahasf3grgk.b01.azurefd.net/releases/v1.0.1793/1.0.1793.4565/advancedapprovals/icon.png
    changedTime: 2026-02-05T19:35:01.4713154Z
    hasPublicData: true
    isSSOSupported: false
    operations:
      - displayName: Run a multistage approval (preview)
        description: Starts an automated multi-stage approval process and then waits for it to complete. The approval process is cancelable.
        inputType:
          properties:
            approvalProcessId:
              displayName: Approval Process
              description: Select an approval process.
              isRequired: true
              order: 0
              type: String

            WebhookApprovalProcessCreationInput:
              description: Fetch the input fields dynamically from Flow-RP. They include inputs like Title as well as the input fields the user defined in their approval process.
              isRequired: true
              order: 1
              type: UnresolvedDynamicType

        outputType: String
        operationId: StartAndWaitForAnApprovalProcess

      - displayName: Request for information
        description: Sends a request with specified inputs to assigned humans. When the assignee responds, the responses can be used in the remaining workflow steps.
        nameForModel: human_in_the_loop_request_for_information
        descriptionForModel: Use this tool to send dynamic requests for information to humans in the loop. The title, message, recipients (assigned to), and specific inputs to be collected are determined by the instructions, prompt, or contextual requirements. For example, the tool can be used to gather information about invoice details.
        inputType:
          properties:
            assignedTo:
              displayName: Assigned to (first to respond)
              description: Recipient email addresses, UPNs, or Microsoft Entra user ids separated by semicolons. The response from the first user to respond to the request is used.
              nameForModel: request_for_information_assigned_to
              descriptionForModel: "Specifies the target recipient(s) for the request using unique identifiers (e.g., email, UPN, or user ID). Create this property by appending the emails of each recipient with a semicolon (;) so the AI can parse and route correctly. Example: \"alice@contoso.com;bob@contoso.com;charlie@contoso.com\""
              isRequired: true
              order: 2
              type: String

            input:
              displayName: Input
              description: Input definition.
              nameForModel: request_for_information_input
              descriptionForModel: "Defines the dynamic set of fields that will be sent to assignees for completion. You must create a JSON object where each property represents a specific input with metadata for validation and display. Supported input types: \"Text\", \"Yes or No\", \"Email\", \"Number\", \"Date\". Do not create types outside this list. For \"Text\", \"Date\", and \"Email\" use type \"string\". For \"Yes or No\" use type \"boolean\". For \"Number\" use type \"number\". For multi-select choice options use type \"array\". The root object must include: \"type\": \"object\", \"properties\": contains child objects for each input field, \"required\": an array of keys for mandatory fields. Each key under \"properties\" should be unique (for example \"invoiceNumber\") and include: \"description\": placeholder text shown in the input field (for example \"Enter the invoice number\"), \"title\": label for the input field (for example \"Invoice Number\"), \"type\": must be one of \"string\", \"number\", \"boolean\", \"array\", \"x-ms-content-hint\": for Text use \"TEXT\", Yes or No use \"BOOLEAN\", Email use \"EMAIL\", Number use \"NUMBER\", Date use \"DATE\", \"x-ms-dynamically-added\": always true. Special cases: For array multi-select, include an \"items\" property with properties inside it being \"enum\" as an array of selectable options and \"type\" set to \"string\". For single-select options, include \"enum\" with the corresponding array directly under the input object (do not include the \"items\" property). You need to intuit whether to users prompt/instructions and scenario to use a multi-select (when the recipient can logically select multiple options) or to use a single-select (when the recipient can logically select only one option). Outside \"properties\", add \"required\" as an array of keys for mandatory inputs. By default, include all keys unless specified otherwise in instructions or prompt. Example of a complete inputs object: { \"type\": \"object\", \"properties\": { \"text\": { \"description\": \"Please enter the invoice ID\", \"title\": \"Invoice ID\", \"type\": \"string\", \"x-ms-content-hint\": \"TEXT\", \"x-ms-dynamically-added\": true }, \"boolean\": { \"description\": \"Please select yes or no as to whether the invoice has been paid\", \"title\": \"Invoice Paid\", \"type\": \"boolean\", \"x-ms-content-hint\": \"BOOLEAN\", \"x-ms-dynamically-added\": true }, \"email\": { \"description\": \"Enter the email address of the submitter of this invoice\", \"format\": \"email\", \"title\": \"Requestor Email\", \"type\": \"string\", \"x-ms-content-hint\": \"EMAIL\", \"x-ms-dynamically-added\": true }, \"number\": { \"description\": \"Please enter the invoice amount in USD without a dollar sign\", \"title\": \"Invoice Amount\", \"type\": \"number\", \"x-ms-content-hint\": \"NUMBER\", \"x-ms-dynamically-added\": true }, \"date\": { \"description\": \"Please enter or select a date by which to pay to get a discount\", \"format\": \"date\", \"title\": \"Discount Date\", \"type\": \"string\", \"x-ms-content-hint\": \"DATE\", \"x-ms-dynamically-added\": true }, \"text_1\": { \"description\": \"Please select the vendor select one\", \"title\": \"Vendor\", \"type\": \"string\", \"x-ms-content-hint\": \"TEXT\", \"x-ms-dynamically-added\": true, \"enum\": [\"Contoso\", \"Fabrikam\", \"Wingtip Toys\"] }, \"text_2\": { \"description\": \"Please select the departments that need to review select all that apply\", \"title\": \"Reviewing Departments\", \"type\": \"array\", \"x-ms-content-hint\": \"TEXT\", \"x-ms-dynamically-added\": true, \"items\": { \"enum\": [\"Engineering\", \"Sales\", \"Finance\", \"Legal\"], \"type\": \"string\" } } }, \"required\": [\"text\", \"boolean\", \"email\", \"number\", \"date\", \"text_1\", \"text_2\"] }"
              isRequired: true
              order: 3
              type: Any

            message:
              displayName: Message (Outlook only)
              description: Specify the message for the request.
              nameForModel: request_for_information_message
              descriptionForModel: "Provides detailed instructions or context for the request. This text should clearly state what information is needed, why the request is being sent, and any specific actions required. It may include a specific message that the requester wants the recipient to see. Avoid vague language; include actionable details. Example: \"Please provide the latest vendor invoice details for October, including invoice number, issue date, total amount, and payment terms.\""
              isRequired: true
              order: 1
              type: String

            title:
              displayName: Title
              description: Specify the title of the request.
              nameForModel: request_for_information_title
              descriptionForModel: "The short, clear identifier for the request being sent to the assignee. It should summarize the purpose of the request in a few words and will appear as the subject line in the email notification. Avoid vague titles; make it specific and relevant to the requested action. Example: \"Request for October Vendor Invoice Details\" or \"October Invoice Details Needed\" (the title does not always need to start with \"Request\")"
              isRequired: true
              order: 0
              type: String

        outputType:
          kind: Record
          properties:
            schema:
              order: 0
              type: Any

        operationId: RequestForInformation

