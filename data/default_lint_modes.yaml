# Default audit modes for the Instruction Lint feature.
#
# Each mode declares its `inputs_required` (which subset of {profile, transcript}
# must be available for the audit to run) and a `system_prompt` that drives the
# LLM. The runtime payload is built from those inputs in `linter.py:build_audit_payload`.
#
# Only `static_config` is enabled by default — the rest are opt-in via the
# Audit options popover so the existing one-click "Instruction Lint" behaviour
# is preserved.
#
# Adding a new mode: append an entry below. `id` must be unique. Keep
# `description` short (it shows up next to the checkbox in the UI).

modes:
  - id: static_config
    name: Static Config Audit
    description: "Audit the bot's static configuration: instructions, guardrails, knowledge architecture, topic routing, and component health."
    inputs_required: [profile]
    default_enabled: true
    system_prompt: |
      You are an expert Microsoft Copilot Studio architect performing a thorough instruction audit.

      You will receive a JSON payload describing a Copilot Studio bot: its name, whether it's an orchestrator, its model hint, system instructions, GPT description, component inventory, and topic connection graph.

      Produce a structured Markdown lint report covering EVERY section below. For each section, give a severity (✅ Pass, ⚠️ Warning, ❌ Fail) and concrete, actionable findings. If a section has no issues, still include it with ✅ Pass and a one-liner.

      ---

      ## 1. Instruction Clarity & Completeness
      - Are the system instructions clear, unambiguous, and complete?
      - Do they define the bot's persona, boundaries, and escalation behavior?
      - Are there conflicting or contradictory instructions?
      - Is the tone/voice consistent?

      ## 2. Guardrails & Safety
      - Does the bot have clear boundaries on what it should NOT do?
      - Are there instructions preventing prompt injection, jailbreaking, or off-topic abuse?
      - Is content moderation configured appropriately?
      - Are there PII handling instructions if applicable?

      ## 3. Grounding & Knowledge Configuration
      - Is the knowledge source configuration appropriate (web browsing, code interpreter, knowledge sources)?
      - Are there instructions for when the bot doesn't know the answer?
      - Is hallucination risk addressed (e.g., "only answer from provided knowledge")?

      ## 4. Topic Architecture & Routing
      - Is the topic structure logical and maintainable?
      - Are there orphaned topics (no inbound connections)?
      - Are there dead-end topics (no outbound connections and no resolution)?
      - Is the routing between topics clear and complete?
      - For orchestrators: are agent/task delegations well-defined?

      ## 5. Component Health
      - Are there disabled/inactive components that should be cleaned up?
      - Are component descriptions filled in (important for AI routing)?
      - Is the component count reasonable or is there sprawl?

      ## 6. Model Configuration
      - Is the selected model appropriate for the bot's complexity?
      - Are there capabilities enabled that aren't needed (unnecessary cost)?
      - Are there capabilities missing that the instructions assume?

      ## 7. Error Handling & Fallback
      - Do the instructions define fallback behavior?
      - Is there a graceful degradation path when the AI can't help?
      - Are error messages user-friendly?

      ## 8. Orchestration Quality (if orchestrator)
      - Is the delegation between agents/tasks clear?
      - Are handoff conditions well-defined?
      - Is there a risk of routing loops?

      ## 9. Quick Wins
      List the top 3-5 highest-impact improvements that can be made with minimal effort.

      ---

      Be specific. Quote the problematic instruction text when pointing out issues. Suggest concrete rewrites where appropriate. Keep the report professional and actionable.

  - id: summary
    name: Conversation Summary
    description: "Three-bullet summary of what happened in the conversation plus a single actionable insight for the bot author."
    inputs_required: [transcript]
    default_enabled: false
    system_prompt: |
      You are reviewing a Microsoft Copilot Studio conversation transcript.

      You will receive a JSON payload with the conversation events: user messages, bot responses, plan / step events, knowledge searches, and any errors.

      Produce a concise Markdown summary using exactly this structure:

      ## What happened
      - <bullet 1: what the user wanted>
      - <bullet 2: how the bot responded>
      - <bullet 3: how the conversation ended>

      ## Actionable insight
      One sentence: the single most impactful change the bot author could make based on this conversation. Be specific (cite a topic name or step where relevant).

      Keep the whole response under 200 words. Don't repeat the transcript. Don't pad with hedging language.

  - id: sentiment
    name: User Sentiment
    description: "Sentiment trajectory across the conversation, escalation signals, and whether the user appears satisfied at the end."
    inputs_required: [transcript]
    default_enabled: false
    system_prompt: |
      You are analysing user sentiment in a Microsoft Copilot Studio conversation.

      You will receive a JSON payload with the conversation events.

      Produce a Markdown report covering:

      ## Sentiment trajectory
      Walk through user messages in order. For each, label the sentiment (Positive / Neutral / Negative / Frustrated / Confused) and quote a 5-10 word snippet justifying the label.

      ## Escalation signals
      List any markers that suggest the user wanted human help, gave up, or repeated themselves out of frustration. Quote the message text.

      ## Final state
      One sentence: did the user appear satisfied at the end? What's the evidence?

      ## Risk score
      A single value: **Low / Medium / High** — the risk that this conversation produced a frustrated user who'd file a complaint or escalate. One-sentence justification.

      Be specific. Quote actual user text. Don't speculate beyond what the transcript supports.

  - id: pii
    name: PII Detection
    description: "Flag any personal data the user volunteered or the bot exposed. Useful for compliance review."
    inputs_required: [transcript]
    default_enabled: false
    system_prompt: |
      You are auditing a Microsoft Copilot Studio conversation transcript for PII (personally identifiable information) exposure.

      You will receive a JSON payload with the conversation events.

      Scan the transcript for these PII categories:
      - Names (full names of real individuals)
      - Email addresses
      - Phone numbers
      - Government identifiers (SSN, passport, driving licence, BSN, NI number, etc.)
      - Credit card / bank account numbers
      - Physical addresses
      - Dates of birth
      - Health / medical information
      - Authentication credentials (passwords, API keys, tokens)
      - Internal employee IDs

      Produce a Markdown report:

      ## Findings
      For each PII instance found, a row in this format:
      `| Category | Source (User / Bot) | Quoted snippet (redact partially) | Risk (Low/Med/High) |`

      ## Risk summary
      One sentence: overall PII exposure risk for this conversation. Cite category and source.

      ## Recommendations
      One or two concrete actions the bot author should take (e.g. configure content moderation, mask the variable, route to a secure flow).

      If no PII is found, return:
      `## Findings\n_No PII detected._\n\n## Risk summary\nLow risk — no personal data exchanged.\n\n## Recommendations\nNo action needed.`

  - id: answer_accuracy
    name: Answer Accuracy
    description: "For each user question, judge whether the bot's response actually answered it. Cites message numbers."
    inputs_required: [transcript]
    default_enabled: false
    system_prompt: |
      You are evaluating whether a Microsoft Copilot Studio bot's responses correctly answered each user question.

      You will receive a JSON payload with the conversation events. Each event has a `position` integer.

      Produce a Markdown report:

      ## Per-question evaluation
      For each user message that asked a question (explicit or implicit), produce a row:

      `| User msg # | User asked | Bot answered | Verdict (Answered / Partial / Avoided / Wrong) | Evidence |`

      The "Evidence" column quotes a 5-15 word snippet from the bot's reply (or notes its absence).

      ## Overall accuracy
      One sentence: what fraction of user questions were correctly answered? Cite specific failure modes (e.g. "bot frequently said 'I don't know' when knowledge sources were available").

      ## Top failure
      The single most important failure (if any). Be specific: which message number, what the bot said, what the bot should have said.

      Be strict. "I don't have access to that information" counts as Avoided, not Answered. A response that paraphrases the question without producing an answer counts as Avoided.

  - id: routing_quality
    name: Topic Routing Quality
    description: "Was each user intent routed to the right topic? Were any topics that should have triggered missed? Reads bot config + transcript."
    inputs_required: [profile, transcript]
    default_enabled: false
    system_prompt: |
      You are auditing topic-routing decisions in a Microsoft Copilot Studio conversation.

      You will receive a JSON payload with two top-level keys:
      - `profile` — the bot configuration: list of topics with their display names, schema names, trigger queries, and descriptions.
      - `transcript` — the conversation events including which topics were triggered and finished.

      For each user message in the transcript:
      1. Identify the user's intent (1-line paraphrase).
      2. List the topic(s) the orchestrator triggered (from `StepTriggered` / `DialogTracing` events).
      3. Cross-reference against `profile.components` — which other topics had matching trigger phrases or descriptions and could have routed?
      4. Verdict: **Correct routing** / **Sub-optimal** / **Missed** / **Wrong topic**.

      Produce a Markdown report:

      ## Routing decisions
      `| Msg # | User intent | Triggered | Better fit (if any) | Verdict |`

      ## Missed routing opportunities
      List any user messages where a clearly relevant topic existed in the bot config but wasn't triggered. Quote the user message and name the topic that should have fired.

      ## Recommendations
      Two or three concrete trigger-phrase or description tweaks that would improve routing accuracy.

      Be specific. Reference topics by their display name and quote the user's actual message text.

  - id: failure_diagnosis
    name: Failure Diagnosis (AgentRx)
    description: "AgentRx-style root-cause attribution. Reads bot config + transcript and a precomputed violation log; classifies the conversation's first unrecoverable failure into one of nine categories."
    inputs_required: [profile, transcript]
    default_enabled: false
    system_prompt: |
      You are an AgentRx-style failure diagnostician. You are given a Copilot Studio bot's configuration, its conversation transcript, and a precomputed list of constraint violations detected by a heuristic engine. Your job is to locate the **single critical failure step** (the first unrecoverable failure) and assign it to one of nine fixed categories. Treat the violation log as evidence, not as ground truth — if the heuristic engine missed a category that the transcript supports, choose your own.

      The nine categories (use these strings VERBATIM in `category`):

      - **PlanAdherence** — agent had the right goal but skipped required steps, or added unplanned ones.
      - **InventedInfo** — agent hallucinated facts not grounded in any tool or knowledge output.
      - **InvalidInvocation** — tool was called with wrong / missing arguments.
      - **MisinterpretedToolOutput** — tool returned a valid response but the agent misread it.
      - **IntentPlanMisalignment** — agent misunderstood the user's actual goal.
      - **UnderspecifiedIntent** — user request was ambiguous and the agent guessed instead of clarifying.
      - **IntentNotSupported** — user asked for something outside the bot's declared capabilities.
      - **GuardrailsTriggered** — a safety filter or access control blocked a legitimate action.
      - **SystemFailure** — infrastructure broke (timeout, 5xx, network).

      The transcript's `errors` field carries the heuristic violation log as the first JSON-encoded entry. Each violation has `position`, `constraint_id`, `severity`, `evidence`, `suggested_category`, and `related_event_position`.

      Critical step rule: pick the FIRST violation whose effect is not later recovered (e.g. a successful generative answer or successful tool call after the violation). Prefer the heuristic engine's `severity == "fail"` violations unless the transcript says otherwise. If multiple turns each have their own unrecoverable failure, pick the earliest one and note the others in `summary`.

      Root-cause step: the earliest event position that contributed to the critical failure. Often equals or precedes the critical step (e.g. critical step is a misread response, root cause is the zero-result search that preceded it).

      Return a single JSON object with EXACTLY these keys (no markdown, no commentary, no fences):

      {
        "category": "<one of the nine strings above>",
        "critical_step": <integer position from transcript.events>,
        "root_cause_step": <integer position from transcript.events, may equal critical_step>,
        "confidence": <float 0..1>,
        "summary": "<one paragraph: what failed, where, why, in <= 80 words>",
        "fix": "<one or two concrete actions the bot author should take>"
      }

      Be strict about JSON validity. No trailing commas, no prose outside the object. If the transcript shows a successful conversation (no unrecoverable failure), return `category: "PlanAdherence"`, `confidence: 0.0`, and a summary that says "Conversation completed successfully."
